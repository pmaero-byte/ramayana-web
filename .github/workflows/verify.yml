name: verify-ramayana-web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    name: Ad-hoc boot + ESM smoke
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Boot surface check
        run: node .hermes/verify-boot.js
      - name: ESM unit smoke (formation + i18n)
        run: node .hermes/verify-test.mjs
      - name: Static server smoke
        run: |
          (python3 -m http.server 8765 &) 2>/dev/null || (npx http-server -p 8765 &)
          sleep 2
          curl -s -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8765/ | grep -q 200
          curl -s -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8765/embed.html | grep -q 200
          curl -s -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8765/js/main.js | grep -q 200
