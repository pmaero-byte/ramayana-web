<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Rāmāyaṇa — Embedded</title>
  <style>
    /* Minimal embed shell so the game can sit inside an iframe / hertree card. */
    html, body, #host { width: 100%; height: 100%; margin: 0; padding: 0; background: #0a0706; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .label { position: fixed; top: 8px; left: 12px; z-index: 100;
             font: 11px/1 system-ui, sans-serif; color: #c4a574; opacity: 0.6;
             pointer-events: none; letter-spacing: 0.1em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="host">
    <iframe id="f" src="./index.html?v=10" allow="autoplay; fullscreen; pointer-lock; gamepad"
            allowfullscreen></iframe>
    <div class="label">Rāmāyaṇa · Web · no Unity</div>
  </div>
  <script>
    // Forward locale hint via postMessage so the iframe can react.
    document.getElementById('f').addEventListener('load', (e) => {
      const url = new URL(location.href);
      const locale = url.searchParams.get('locale');
      if (locale) {
        e.target.contentWindow.postMessage({ type: 'rama-set-locale', locale }, '*');
      }
    });
    // Resize the iframe to its parent on resize — keeps aspect sane in a card.
    const fit = () => {
      const f = document.getElementById('f');
      const r = f.parentNode.getBoundingClientRect();
      f.style.width = r.width + 'px';
      f.style.height = r.height + 'px';
    };
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
